name: Keep Render Services Alive

on:
  schedule:
    # Runs every 14 minutes to prevent Render free tier sleep
    - cron: '*/14 * * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping API Gateway
        run: |
          curl -f https://aiq-api-gateway.onrender.com/actuator/health || echo "Gateway warming up"

      - name: Ping Core Service
        run: |
          curl -f https://aiq-core-service.onrender.com/actuator/health || echo "Core warming up"

      - name: Ping Worker Service
        run: |
          curl -f https://aiq-worker-service.onrender.com/actuator/health || echo "Worker warming up"
