spring:
  config:
    import: ""   # no .env file in production — use real env vars

  datasource:
    url: jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}
    username: ${PGUSER}
    password: ${PGPASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      url: ${REDIS_URL:redis://red-d7mv0orbc2fs738grg0g:6379}

  rabbitmq:
    host: ${RABBITMQ_HOST:chameleon.lmq.cloudamqp.com}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_DEFAULT_USER:jbkdkvkb}
    password: ${RABBITMQ_DEFAULT_PASS}
    virtual-host: ${RABBITMQ_VHOST:jbkdkvkb}

management:
  health:
    redis:
      enabled: false
    rabbit:
      enabled: false

logging:
  file:
    name: ""   # stdout only in prod
