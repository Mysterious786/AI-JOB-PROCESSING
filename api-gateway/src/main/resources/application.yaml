spring:
  application:
    name: api-gateway

server:
  port: 8080

gateway:
  upstream:
    core-service: ${CORE_SERVICE_BASE_URL:http://localhost:8082}
    worker-service: ${WORKER_SERVICE_BASE_URL:http://localhost:8083}
  cors:
    allowed-origins: ${GATEWAY_ALLOWED_ORIGINS:http://localhost:3000}

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
