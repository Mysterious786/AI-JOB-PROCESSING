spring:
  config:
    import: ""   # no .env file in production — use real env vars
  datasource:
    # Render injects PGHOST, PGPORT, PGDATABASE, PGUSER, PGPASSWORD for managed Postgres
    url: jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}
    username: ${PGUSER}
    password: ${PGPASSWORD}
  redis:
    # Render injects REDIS_URL as rediss://:<password>@<host>:<port>
    url: ${REDIS_URL}
  rabbitmq:
    host: ${RABBITMQ_HOST}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_DEFAULT_USER}
    password: ${RABBITMQ_DEFAULT_PASS}
    virtual-host: ${RABBITMQ_VHOST:/}

logging:
  file:
    name: ""   # no file logging in prod — stdout only (Render captures stdout)
